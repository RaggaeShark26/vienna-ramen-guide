<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍜 Vienna Ramen Guide - Best Ramen Spots in Vienna</title>
    <meta name="description" content="Discover the best ramen restaurants in Vienna. Authentic, modern, and traditional ramen spots with reviews, locations, and contact information.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 40px 0;
        }

        #restaurant-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .restaurant-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #e1e8ed;
        }

        .restaurant-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
        }

        .card-content {
            padding: 25px;
        }

        .restaurant-name {
            font-size: 1.5rem;
            color: #2c3e50;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .tags {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .description {
            color: #555;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .restaurant-details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .detail-item .icon {
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .detail-item a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .detail-item a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .instagram-link {
            font-weight: 500;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            padding: 20px;
            color: white;
            opacity: 0.8;
        }

        .error-message {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        /* Mobile responsiveness */
        @media (max-width: 768px) {
            .main-container {
                padding: 15px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .header p {
                font-size: 1rem;
            }

            #restaurant-container {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .card-content {
                padding: 20px;
            }

            .restaurant-name {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .main-container {
                padding: 10px;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .card-content {
                padding: 15px;
            }

            .detail-item {
                font-size: 0.85rem;
            }
        }

        /* Animation for loading */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <header class="header">
            <h1>🍜 Vienna Ramen Guide</h1>
            <p>Discover the best authentic ramen restaurants in Vienna, Austria. From traditional to modern fusion, find your perfect bowl!</p>
        </header>

        <div class="loading" id="loading">
            Loading delicious ramen spots...
        </div>

        <div id="restaurant-container">
            <!-- Restaurant cards will be generated here -->
        </div>

        <footer class="footer">
            <p>🍜 Vienna Ramen Guide | Updated regularly with the latest spots</p>
        </footer>
    </div>

    <script>
        // Vienna Ramen Guide - Enhanced Restaurant System
        // Your GitHub repository URL
        const GITHUB_DATA_URL = 'https://raw.githubusercontent.com/RaggaeShark26/vienna-ramen-guide/main/restaurants.json';

        // Fallback data (in case GitHub is unavailable)
        const fallbackRestaurants = [
            {
                name: "Mochi Ramen Bar",
                tags: ["cozy", "authentic", "traditional"],
                description: "Authentic Japanese ramen in a warm, intimate setting with perfectly crafted broths and fresh noodles.",
                address: "Vorgartenmarkt Stand 12-29, 1020 Wien",
                phone: "01 212257545",
                priceRange: "17-20€",
                openingHours: "Mo-Sa 11:30-22:00",
                website: "https://www.mochi-ramen.com/",
                instagram: "mochi_ramen_bar"
            },
            {
                name: "Maka Ramen",
                tags: ["modern", "fusion", "creative"],
                description: "Modern ramen shop with innovative fusion flavors and Instagram-worthy presentation.",
                address: "Wimbergergasse 41/1, 1070 Wien",
                phone: "0677 63109067",
                priceRange: "16-18€",
                openingHours: "Mi–So 16:30–22:00",
                website: "https://maka-ramen.at",
                instagram: "maka_ramen"
            },
            {
                name: "Ramen Makotoya",
                tags: ["traditional", "authentic", "popular"],
                description: "Traditional ramen experience with rich, flavorful broths and handmade noodles.",
                address: "Windmühlgasse 26, 1060 Wien",
                phone: "+43 1 555 0123",
                priceRange: "€€€",
                openingHours: "Daily 11:30-22:30",
                website: "https://makotoya.at",
                instagram: "makotoya_vienna"
            }
        ];

        // Load restaurants from GitHub or fallback
        async function loadRestaurants() {
            try {
                console.log('🍜 Loading restaurants from GitHub...');
                const response = await fetch(GITHUB_DATA_URL);
                
                if (!response.ok) {
                    throw new Error('GitHub data not available');
                }
                
                const data = await response.json();
                console.log('✅ Successfully loaded from GitHub!');
                return data.restaurants || data;
                
            } catch (error) {
                console.log('⚠️ Using fallback data:', error.message);
                return fallbackRestaurants;
            }
        }

        // Generate restaurant cards
        function generateRestaurantCards(restaurants) {
            const container = document.getElementById('restaurant-container');
            const loadingElement = document.getElementById('loading');
            
            if (!container) {
                console.error('❌ Restaurant container not found!');
                return;
            }
            
            // Hide loading indicator
            if (loadingElement) {
                loadingElement.style.display = 'none';
            }
            
            container.innerHTML = '';
            
            if (!restaurants || restaurants.length === 0) {
                container.innerHTML = '<div class="error-message">No restaurants found. Please try again later.</div>';
                return;
            }
            
            restaurants.forEach(restaurant => {
                const card = document.createElement('div');
                card.className = 'restaurant-card';
                
                // Clean Instagram handle (remove @ and URL if present)
                let instagramHandle = restaurant.instagram;
                if (instagramHandle) {
                    instagramHandle = instagramHandle.replace('@', '').replace('https://www.instagram.com/', '').replace('/?hl=de', '').replace('/', '');
                }
                
                card.innerHTML = `
                    <div class="card-content">
                        <h3 class="restaurant-name">${restaurant.name}</h3>
                        
                        <div class="tags">
                            ${restaurant.tags ? restaurant.tags.map(tag => `<span class="tag">#${tag}</span>`).join('') : ''}
                        </div>
                        
                        <p class="description">${restaurant.description}</p>
                        
                        <div class="restaurant-details">
                            <div class="detail-item">
                                <span class="icon">📍</span>
                                <a href="https://maps.google.com/maps?q=${encodeURIComponent(restaurant.address)}" target="_blank">
                                    ${restaurant.address}
                                </a>
                            </div>
                            
                            <div class="detail-item">
                                <span class="icon">📞</span>
                                <span>${restaurant.phone}</span>
                            </div>
                            
                            <div class="detail-item">
                                <span class="icon">💰</span>
                                <span>${restaurant.priceRange}</span>
                            </div>
                            
                            <div class="detail-item">
                                <span class="icon">🕐</span>
                                <span>${restaurant.openingHours}</span>
                            </div>
                            
                            ${restaurant.website ? `
                            <div class="detail-item">
                                <span class="icon">🌐</span>
                                <a href="${restaurant.website}" target="_blank">Website</a>
                            </div>
                            ` : ''}
                            
                            ${instagramHandle ? `
                            <div class="detail-item">
                                <span class="icon">📱</span>
                                <a href="https://instagram.com/${instagramHandle}" target="_blank" class="instagram-link">
                                    @${instagramHandle}
                                </a>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                
                container.appendChild(card);
            });
            
            console.log(`✅ Generated ${restaurants.length} restaurant cards!`);
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', async function() {
            console.log('🍜 Vienna Ramen Guide loading...');
            
            try {
                const restaurants = await loadRestaurants();
                generateRestaurantCards(restaurants);
            } catch (error) {
                console.error('❌ Failed to load restaurants:', error);
                const container = document.getElementById('restaurant-container');
                const loadingElement = document.getElementById('loading');
                
                if (loadingElement) {
                    loadingElement.style.display = 'none';
                }
                
                if (container) {
                    container.innerHTML = '<div class="error-message">Failed to load restaurants. Please refresh the page.</div>';
                }
            }
        });
    </script>
</body>
</html>
